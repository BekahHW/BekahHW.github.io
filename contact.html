{% if site.contact_page_description %}
<p>{{ site.contact_page_description }}</p>
{% endif %}

<section class="contact-form">
  <form action="https://formspree.io/f/xrgvkwwz" method="POST" id="contact-form">
    <div class="form-item">
      <label class="form-label">Your Email <span>(required)</span></label>
      <input type="email" name="email" placeholder="Your email address..." class="form-input" required />
    </div>

    <div class="form-item">
      <label class="form-label">Your Name <span>(required)</span></label>
      <input type="text" name="name" placeholder="Your name..." class="form-input" required />
    </div>

    <div class="form-item">
      <label class="form-label">Your Message <span>(required)</span></label>
      <textarea name="message" placeholder="Your message..." class="form-textarea" required></textarea>
    </div>

    <input type="hidden" name="_next" value="/thank-you" />
    <input type="hidden" name="_subject" value="Contact form submission" />
    <input type="text" name="_gotcha" style="display: none;" class="contact-form__gotcha" value="" />

    <div class="form-item">
      <button type="submit" class="btn">Send Message</button>
    </div>
  </form>
</section>
