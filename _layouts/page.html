---
layout: default
---

<article class="page-template">
  <header class="page-header{% if page.snapshot %} page-header--with-snapshot{% if page.snapshot.side == 'left' %} snapshot-left{% endif %}{% endif %}" style="position:relative;">
    {% if page.marginalia %}
    <span class="note" style="top:{{ page.marginalia_top | default: '48px' }};" aria-hidden="true">{{ page.marginalia }}</span>
    {% endif %}

    <div>
      <h1>{{ page.title }}</h1>
    </div>

    {% if page.snapshot %}
    {% include snapshot.html %}
    {% endif %}
  </header>

  <div class="page-content{% if page.wide %} page-content-wide{% endif %}">
    {{ content }}
  </div>
</article>
